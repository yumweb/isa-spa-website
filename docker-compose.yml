services:
  mysql:
    image: mysql:8.4
    container_name: isa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: isa_spa
      MYSQL_USER: isa
      MYSQL_PASSWORD: isa_password
    ports:
      - "3308:3306"
    volumes:
      - isa_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  isa_mysql_data:
